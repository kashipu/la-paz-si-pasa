services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-root-password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  cms:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WORDPRESS_URL:-http://localhost:8080}');
        define('WP_SITEURL', '${WORDPRESS_URL:-http://localhost:8080}');
        define('DISALLOW_FILE_EDIT', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - wordpress_data:/var/www/html
      - ./apps/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins
    ports:
      - "8080:80"

  frontend:
    image: node:22-alpine
    working_dir: /app
    profiles:
      - frontend
    environment:
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8080}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
      WORDPRESS_PREVIEW_SECRET: ${WORDPRESS_PREVIEW_SECRET:-change-me}
    volumes:
      - ./apps/frontend:/app
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  wpcli:
    image: wordpress:cli-php8.3
    profiles:
      - tools
    depends_on:
      - db
      - cms
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    volumes:
      - wordpress_data:/var/www/html
      - ./apps/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins

volumes:
  db_data:
  wordpress_data:
